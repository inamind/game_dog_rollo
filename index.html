<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2c3e50">
  <title>ROLLO - 부수기 게임</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <main id="app" class="app-shell">
    <section id="title-screen" class="screen is-active" aria-labelledby="title-heading">
      <h1 id="title-heading" class="sr-only">ROLLO</h1>
      <img class="game-logo" src="./image_sources/game_logo.png" alt="ROLLO 게임 로고">
      <button id="start-button" class="primary-button" type="button">시작하기</button>
    </section>

    <section id="name-screen" class="screen" aria-labelledby="name-heading" hidden>
      <div class="panel compact-panel">
        <h2 id="name-heading">강아지 이름을 지어주세요!</h2>
        <label class="field-label" for="player-name">이름</label>
        <input id="player-name" class="text-input" type="text" value="ROLLO" maxlength="12" autocomplete="off">
        <button id="confirm-name-button" class="primary-button" type="button">확인</button>
      </div>
    </section>

    <section id="location-screen" class="screen" aria-labelledby="location-heading" hidden>
      <div class="panel location-panel">
        <h2 id="location-heading">어디를 부술까?</h2>
        <div class="location-grid">
          <button class="location-card" type="button" data-location="yard">
            <span class="location-icon" aria-hidden="true">🌳</span>
            <strong>마당</strong>
            <span>물건 15개 · 제한 시간 8분</span>
          </button>
          <button class="location-card" type="button" data-location="house">
            <span class="location-icon" aria-hidden="true">🏠</span>
            <strong>집</strong>
            <span>물건 20개 · 제한 시간 10분</span>
          </button>
        </div>
      </div>
    </section>

    <section id="loading-screen" class="screen" aria-labelledby="loading-heading" hidden>
      <div class="panel compact-panel">
        <h2 id="loading-heading">게임을 준비하고 있어요</h2>
        <progress id="loading-progress" max="1" value="0"></progress>
        <p id="loading-status" role="status">필수 이미지를 확인하는 중...</p>
      </div>
    </section>

    <section id="play-screen" class="screen play-screen" aria-label="게임 화면" hidden>
      <canvas id="game-canvas" aria-label="ROLLO 게임 플레이 영역"></canvas>
      <div class="hud hud-top">
        <button id="back-button" class="hud-button" type="button">← 이전</button>
        <div id="timer-display" class="hud-pill">남은 시간 08:00</div>
        <button id="exit-button" class="hud-button" type="button">나가기</button>
      </div>
      <div class="hud hud-bottom">
        <div class="player-stats">
          <span id="level-display">Lv.1</span>
          <span id="exp-display">EXP 0 / 12</span>
          <span id="destroyed-display">부순 개수 0</span>
        </div>
      </div>
      <div class="virtual-pad" aria-label="이동 가상키">
        <button class="virtual-button move-up" type="button" data-move="up" aria-label="위층으로 이동">
          <img class="direction-icon" src="./image_sources/ui_direction_up.png" alt="" draggable="false">
        </button>
        <button class="virtual-button move-left" type="button" data-move="left" aria-label="왼쪽 이동">
          <img class="direction-icon" src="./image_sources/ui_direction_left.png" alt="" draggable="false">
        </button>
        <button class="virtual-button move-down" type="button" data-move="down" aria-label="아래층으로 이동">
          <img class="direction-icon" src="./image_sources/ui_direction_down.png" alt="" draggable="false">
        </button>
        <button class="virtual-button move-right" type="button" data-move="right" aria-label="오른쪽 이동">
          <img class="direction-icon" src="./image_sources/ui_direction_right.png" alt="" draggable="false">
        </button>
      </div>
      <div class="attack-controls virtual-attacks" aria-label="공격 가상키">
        <button id="smash-button" class="attack-button smash-button" type="button">
          <span class="key-label">Q</span><span>💥 공격</span>
        </button>
        <button id="bite-button" class="attack-button bite-button" type="button">
          <span class="key-label">W</span><span id="bite-button-text">🔥 필살기</span>
        </button>
      </div>
      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </section>

    <section id="result-screen" class="screen" aria-labelledby="result-heading" hidden>
      <div class="panel compact-panel">
        <h2 id="result-heading">게임 결과</h2>
        <div id="result-summary" class="result-summary"></div>
        <button id="retry-button" class="primary-button" type="button">다시하기</button>
        <button id="home-button" class="secondary-button" type="button">처음으로</button>
      </div>
    </section>
  </main>

  <dialog id="exit-dialog" class="confirm-dialog">
    <form method="dialog">
      <h2>현재 진행을 종료할까요?</h2>
      <p>지금까지 완전히 부순 물건의 EXP만 기록됩니다.</p>
      <div class="dialog-actions">
        <button value="cancel" class="secondary-button">계속하기</button>
        <button id="confirm-exit-button" value="confirm" class="danger-button">종료하기</button>
      </div>
    </form>
  </dialog>

  <script src="./dist/rollo.bundle.js"></script>
</body>
</html>
